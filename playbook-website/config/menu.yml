- category: alerts_and_dialogs
  description: Components for displaying alerts, confirmations, and overlay content to users.
  components:
  - name: dialog
    platforms: *1
    description: Modal dialog for confirmations, forms, or focused content. Supports status icons for info, caution, delete, error, and success states.
    status: stable
    icons_used: true
    react_rendered: false
    enhanced_element_used: true
    schema_path: pb_dialog/kit.schema.json
    props_summary:
      - opened: boolean (required)
      - size: "sm | md | lg | xl | status_size | content"
      - title: string
      - text: string
      - status: "info | caution | delete | error | success"
      - closeable: boolean
      - placement: "left | center | right"
      - confirmButton: string
      - cancelButton: string
      - onClose: function
      - onConfirm: function
      - onCancel: function
      - loading: boolean
      - fullHeight: boolean
    related_components:
      - popover
      - fixed_confirmation_toast
      - overlay
    subcomponents:
      - Dialog.Header
      - Dialog.Body
      - Dialog.Footer
  - name: fixed_confirmation_toast
    platforms: *1
    description: Fixed Confirmation Toast is used as an alert. Success is used when
      a user successfully completes an action. Error is used when there is an error
      and the user cannot proceed. Neutral is used to display information to a user
      to complete a task.
    status: stable
    icons_used: true
    react_rendered: false
    enhanced_element_used: true
    schema_path: pb_fixed_confirmation_toast/kit.schema.json
    props_summary:
      - status: "success | error | neutral | tip"
      - text: string
      - closeable: boolean
      - autoClose: number (ms)
      - horizontal: "left | center | right"
      - vertical: "top | bottom"
      - onClose: function
    related_components:
      - dialog
      - tooltip
  - name: popover
    platforms: *1
    description: A popover is a way to toggle content on top of other content. It
      can be used for small texts, small forms, or even dropdowns. By default, popover
      will toggle open/closed by simply clicking the trigger element.
    status: stable
    icons_used: false
    react_rendered: false
    enhanced_element_used: true
    schema_path: pb_popover/kit.schema.json
    props_summary:
      - reference: React.RefObject (required)
      - show: boolean
      - placement: "top | bottom | left | right | top-start | top-end | bottom-start | bottom-end"
      - offset: boolean
      - closeOnClick: "inside | outside | any | none"
      - shouldClosePopover: function
    related_components:
      - dialog
      - tooltip
      - dropdown
  - name: tooltip
    platforms: *1
    description: Small overlay providing contextual information on hover or focus.
    status: stable
    icons_used: false
    react_rendered: false
    enhanced_element_used: true
    schema_path: pb_tooltip/kit.schema.json
    props_summary:
      - text: string (required)
      - placement: "top | bottom | left | right"
      - trigger: string
      - delay: "{ open: number, close: number }"
      - interaction: boolean
    related_components:
      - popover
      - copy_button
- category: buttons
  description: Buttons are used primarily for actions, such as “Save” and “Cancel”.
    Link Buttons are used for less important or less commonly used actions, such as
    “view shipping settings”.
  components:
  - name: button
    platforms: *1
    description: Interactive element for triggering actions. Primary variant for main CTAs, secondary for less prominent actions, danger for destructive actions.
    status: stable
    icons_used: true
    react_rendered: false
    enhanced_element_used: true
    schema_path: pb_button/kit.schema.json
    props_summary:
      - variant: "primary | secondary | link | danger | reaction"
      - size: "sm | md | lg"
      - disabled: boolean
      - loading: boolean
      - icon: string
      - iconRight: boolean
      - fullWidth: boolean
      - link: string
      - htmlType: "submit | reset | button"
    related_components:
      - icon_button
      - circle_icon_button
      - button_toolbar
      - link
  - name: button_toolbar
    platforms: *1
    description: This kit should primarily hold the most commonly used buttons.
    status: stable
    icons_used: false
    react_rendered: false
    enhanced_element_used: false
    schema_path: pb_button_toolbar/kit.schema.json
    props_summary:
      - orientation: "horizontal | vertical"
      - variant: "primary | secondary"
    related_components:
      - button
      - icon_button
  - name: circle_icon_button
    platforms: *1
    description: When using Icon Circle Button, the icon must be clear a clear indication
      of what the button does because there is no text.
    status: stable
    icons_used: true
    react_rendered: false
    enhanced_element_used: false
    schema_path: pb_circle_icon_button/kit.schema.json
    props_summary:
      - icon: string (required)
      - variant: "primary | secondary | link"
      - disabled: boolean
      - link: string
    related_components:
      - button
      - icon_button
      - icon_circle
  - name: icon_button
    platforms: *1
    status: deprecated
    icons_used: true
    react_rendered: false
    enhanced_element_used: false
    deprecated_note: Use Button with icon prop or CircleIconButton instead
    schema_path: pb_icon_button/kit.schema.json
    props_summary:
      - icon: string (required)
      - variant: "default | inline"
      - onClick: function
      - disabled: boolean
    related_components:
      - button
      - circle_icon_button
  - name: copy_button
    platforms: *1
    description: Button that copies text to clipboard with visual feedback.
    status: stable
    icons_used: false
    react_rendered: false
    enhanced_element_used: true
    schema_path: pb_copy_button/kit.schema.json
    props_summary:
      - text: string (required)
      - from: string
      - tooltipPlacement: "top | bottom | left | right"
      - tooltipText: string
    related_components:
      - button
      - tooltip
