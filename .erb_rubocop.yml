# Aligned with nitro-web (nitro_linting .erb_rubocop.yml).
# ERB-specific RuboCop config; used by erb_lint Rubocop linter.

inherit_from: .rubocop.yml

require:
  - rubocop-rails

Layout/FirstArgumentIndentation:
  Enabled: false

Layout/FirstHashElementIndentation:
  Enabled: false

Layout/InitialIndentation:
  Enabled: false

Layout/LeadingEmptyLines:
  Enabled: false

Layout/LineLength:
  Enabled: false

Layout/MultilineHashBraceLayout:
  Enabled: false

Layout/TrailingEmptyLines:
  Enabled: false

Layout/TrailingWhitespace:
  Enabled: false

Naming/FileName:
  Enabled: false

Style/BarePercentLiterals:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/PercentQLiterals:
  Enabled: false

Style/RedundantConstantBase:
  Exclude:
    - "**/*component.html.erb"

Style/RedundantPercentQ:
  Enabled: false

Style/SafeNavigationChainLength:
  Enabled: false

Lint/UselessAssignment:
  Enabled: false

Rails/OutputSafety:
  Enabled: false
